<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecureRAG — 加密向量搜索平台</title>
<style>
  :root {
    --bg-primary: #0a0e14; --bg-secondary: #11161e;
    --bg-card: rgba(255,255,255,.025); --border: rgba(255,255,255,.06);
    --border-focus: rgba(70,140,255,.3); --text-primary: #c8d6e5;
    --text-secondary: #6b7280; --text-heading: #e8edf4;
    --accent: #468cff; --accent-dim: rgba(70,140,255,.12);
    --green: #4ade80; --green-dim: rgba(74,222,128,.12);
    --amber: #f59e0b; --red: #f87171;
    --radius: 10px; --radius-sm: 6px;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter','Segoe UI','PingFang SC',system-ui,-apple-system,sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh;line-height:1.6}
  nav{display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:56px;border-bottom:1px solid var(--border);background:var(--bg-secondary);position:sticky;top:0;z-index:10}
  .nav-brand{display:flex;align-items:center;gap:.5rem;font-weight:700;font-size:1.05rem;color:var(--text-heading);text-decoration:none}
  .nav-brand .icon{font-size:1.3rem}
  .nav-links{display:flex;gap:1.5rem;align-items:center}
  .nav-links a{color:var(--text-secondary);text-decoration:none;font-size:.82rem;transition:color .15s}
  .nav-links a:hover,.nav-links a.active{color:var(--text-heading)}
  .nav-links a.active{font-weight:600}
  .nav-status{display:flex;align-items:center;gap:.4rem;font-size:.75rem;color:var(--green)}
  .nav-status .dot{width:7px;height:7px;border-radius:50%;background:var(--green)}
  .container{max-width:900px;margin:0 auto;padding:2rem 1.5rem 4rem}
  .hero{text-align:center;margin-bottom:2rem}
  .hero h1{font-size:1.8rem;font-weight:800;color:var(--text-heading);margin-bottom:.3rem}
  .hero .subtitle{color:var(--text-secondary);font-size:.9rem;max-width:500px;margin:0 auto}
  .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:.75rem;margin-bottom:2rem}
  .stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;text-align:center}
  .stat-value{font-size:1.4rem;font-weight:700;color:var(--text-heading)}
  .stat-label{font-size:.72rem;color:var(--text-secondary);margin-top:.2rem;text-transform:uppercase;letter-spacing:.04em}
  .card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1rem}
  .card-title{font-weight:700;font-size:.9rem;color:var(--text-heading);margin-bottom:.5rem}
  .feature-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:2rem}
  .feature-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;text-align:center;text-decoration:none;transition:border-color .15s,background .15s;display:block}
  .feature-card:hover{border-color:var(--border-focus);background:rgba(255,255,255,.04)}
  .feature-icon{font-size:2rem;margin-bottom:.6rem}
  .feature-title{font-size:.9rem;font-weight:700;color:var(--text-heading);margin-bottom:.3rem}
  .feature-desc{font-size:.75rem;color:var(--text-secondary)}
  footer{text-align:center;padding:2rem;color:var(--text-secondary);font-size:.72rem;border-top:1px solid var(--border)}
  @media(max-width:640px){nav{padding:0 1rem}.nav-links{display:none}.feature-grid,.stats-row{grid-template-columns:repeat(2,1fr)}.hero h1{font-size:1.4rem}.container{padding:1.5rem 1rem 3rem}}
</style>
</head>
<body>
<nav>
  <a class="nav-brand" href="/"><span class="icon">🔐</span> SecureRAG</a>
  <div class="nav-links">
    <a href="/" class="active">首页</a>
    <a href="/search.html">搜索</a>
    <a href="/upload.html">上传</a>
    <a href="/docs.html">文档</a>
    <div class="nav-status"><span class="dot"></span> 运行中</div>
  </div>
</nav>
<div class="container">
  <section class="hero">
    <h1>加密向量搜索</h1>
    <p class="subtitle">基于 SecureAI™ 加密技术的隐私保护语义搜索，查询过程中数据始终保持加密状态。</p>
  </section>
  <div class="stats-row" id="stats-row">
    <div class="stat-card"><div class="stat-value" id="stat-docs">—</div><div class="stat-label">文档总数</div></div>
    <div class="stat-card"><div class="stat-value" id="stat-dim">64</div><div class="stat-label">向量维度</div></div>
    <div class="stat-card"><div class="stat-value" id="stat-queries">0</div><div class="stat-label">今日查询</div></div>
    <div class="stat-card"><div class="stat-value" style="color:var(--green)">正常</div><div class="stat-label">集群状态</div></div>
  </div>
  <div class="feature-grid">
    <a class="feature-card" href="/search.html">
      <div class="feature-icon">🔍</div>
      <div class="feature-title">向量搜索</div>
      <div class="feature-desc">输入查询内容，搜索加密向量索引</div>
    </a>
    <a class="feature-card" href="/upload.html">
      <div class="feature-icon">📄</div>
      <div class="feature-title">上传文档</div>
      <div class="feature-desc">上传文档并加密索引</div>
    </a>
    <a class="feature-card" href="/docs.html">
      <div class="feature-icon">📋</div>
      <div class="feature-title">文档浏览</div>
      <div class="feature-desc">查看已索引的文档列表</div>
    </a>
  </div>
</div>
<footer>SecureRAG v1.0 &copy; 2025 SecureAI Labs. 文档受 SecureAI™ 端到端加密保护。</footer>
<script>
let queryCount=0;
async function loadStats(){try{const r=await fetch('/api/stats');const d=await r.json();document.getElementById('stat-docs').textContent=d.total_docs;document.getElementById('stat-dim').textContent=d.dim}catch(e){}}
loadStats();
</script>
</body>
</html>
